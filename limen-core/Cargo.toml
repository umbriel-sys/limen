[package]
name = "limen-core"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "Core traits, types, errors, and the generic runtime for the Limen edge inference system."
repository = "https://example.com/your/limen"

[features]
default = ["alloc"]
alloc = []
std = ["alloc"]
serde = ["dep:serde"]

[dependencies]
serde = { version = "1.0", default-features = false, features = ["derive"], optional = true }
